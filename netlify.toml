[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/organizational-diagnostic"
  to = "/organizational-diagnostic.html"
  status = 200

[[redirects]]
  from = "/institutional-diagnostic"
  to = "/organizational-diagnostic.html"
  status = 301

[[redirects]]
  from = "/institutional-diagnostic.html"
  to = "/organizational-diagnostic.html"
  status = 301

[[redirects]]
  from = "/audit"
  to = "/audit.html"
  status = 200

[[redirects]]
  from = "/fieldkit"
  to = "https://9762838302398.gumroad.com/l/czmqp"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/audit.html"
  [headers.values]
    Content-Security-Policy = "script-src 'self' 'unsafe-inline' https://formspree.io https://plausible.io"
