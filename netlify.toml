[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/institutional-diagnostic"
  to = "/institutional-diagnostic.html"
  status = 200

[[redirects]]
  from = "/audit"
  to = "/audit.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/audit.html"
  [headers.values]
    Content-Security-Policy = "script-src 'self' 'unsafe-inline' https://formspree.io https://plausible.io"
